unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

set-option -g default-shell "/bin/bash"
set-option -g default-command "if command -v fish >/dev/null 2>&1; then exec fish; else exec /bin/bash; fi"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window

# Quick splits
bind "|" split-window -hc "#{pane_current_path}"
bind "\\" split-window -hc "#{pane_current_path}"
bind "-" split-window -vc "#{pane_current_path}"
bind "_" split-window -vc "#{pane_current_path}"

# Vim-style resize (hold Ctrl)
bind -n C-h resize-pane -L 2
bind -n C-j resize-pane -D 2
bind -n C-k resize-pane -U 2
bind -n C-l resize-pane -R 2

# CHANGED: Use tmux-256color instead of screen-256color
set -g default-terminal "tmux-256color"

set -g mouse on
unbind -n MouseDrag1Pane

# ADDED: Force terminal overrides to catch the specific sequence crashing tmux
set -as terminal-features ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:ti@:te@"

# Remove Esc delay (default 500ms)
set -sg escape-time 0

# Pass focus events to Neovim
set -g focus-events on

# Auto-renumber windows
set -g renumber-windows on

# Faster status bar refresh
set -g status-interval 5

# Bigger scrollback
set -g history-limit 50000

# Forward OSC 52 clipboard to WezTerm
set -g set-clipboard on

# Vi-style copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Quick session switching with fzf
bind S run "tmux list-sessions -F '#S' | fzf --reverse --prompt='session: ' | xargs tmux switch-client -t"

# Reload config
bind r source-file ~/.tmux.conf
